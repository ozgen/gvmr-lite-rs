name: Release gvmr-lite-rs

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

env:
  BIN_NAME: gvmr-server
  PACKAGE_NAME: gvmr-server
  DOCKER_IMAGE_NAME: gvmr-lite-rs

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Get latest semver tag
        id: get_tag
        run: |
          git fetch --tags --force

          TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)

          if [ -z "$TAG" ]; then
            TAG="v0.0.0"
          fi

          echo "Latest tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Bump semver version
        id: bump
        run: |
          OLD_VERSION="${{ steps.get_tag.outputs.tag }}"
          VERSION="${OLD_VERSION#v}"

          IFS='.' read -r major minor patch <<< "$VERSION"

          case "${{ github.event.inputs.version_type }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Invalid version type: ${{ github.event.inputs.version_type }}" >&2
              exit 1
              ;;
          esac

          NEW_VERSION="$major.$minor.$patch"
          NEW_TAG="v$NEW_VERSION"

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

          echo "CUSTOM_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
          echo "CUSTOM_TAG=$NEW_TAG" >> "$GITHUB_ENV"

      - name: Show release version
        run: |
          echo "Releasing $CUSTOM_TAG"
          echo "Cargo version: $CUSTOM_VERSION"

      - name: Update Cargo workspace version
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          import os

          version = os.environ["CUSTOM_VERSION"]
          path = Path("Cargo.toml")
          text = path.read_text()

          # Prefer updating [workspace.package] version.
          updated = re.sub(
              r'(?m)^version\s*=\s*"[^"]+"',
              f'version = "{version}"',
              text,
              count=1,
          )

          if updated == text:
              raise SystemExit("Could not find a version field in root Cargo.toml")

          path.write_text(updated)
          PY

      - name: Update Cargo.lock
        run: |
          cargo update --workspace

      - name: Run tests
        run: |
          cargo test --workspace --locked

      - name: Build release binary
        run: |
          cargo build --release --locked -p "$PACKAGE_NAME" --bin "$BIN_NAME"

      - name: Prepare release artifact
        run: |
          mkdir -p dist
          cp "target/release/$BIN_NAME" "dist/$BIN_NAME-linux-amd64"
          chmod +x "dist/$BIN_NAME-linux-amd64"

      - name: Commit version changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Cargo.toml Cargo.lock

          if ! git diff --cached --quiet; then
            git commit -m "chore(release): bump to $CUSTOM_TAG"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No version changes to commit."
          fi

      - name: Create and push tag
        run: |
          git fetch --tags --force

          if git rev-parse "$CUSTOM_TAG" >/dev/null 2>&1; then
            echo "Tag $CUSTOM_TAG already exists" >&2
            exit 1
          fi

          git tag "$CUSTOM_TAG" -m "Release $CUSTOM_TAG"
          git push origin "$CUSTOM_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.CUSTOM_TAG }}
          name: ${{ env.CUSTOM_TAG }}
          files: |
            dist/gvmr-server-linux-amd64

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/gvmr-lite-rs:${{ env.CUSTOM_TAG }}
            docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/gvmr-lite-rs:${{ env.CUSTOM_VERSION }}
            docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/gvmr-lite-rs:latest