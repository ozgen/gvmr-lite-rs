name: Release gvmr-lite-rs fast

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

env:
  DOCKER_IMAGE_NAME: gvmr-lite-rs
  TYPST_VERSION: 0.14.0

jobs:
  release-fast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Get latest semver tag
        id: get_tag
        run: |
          git fetch --tags --force

          TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)

          if [ -z "$TAG" ]; then
            TAG="v0.0.0"
          fi

          echo "Latest tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Bump semver version
        id: bump
        run: |
          OLD_VERSION="${{ steps.get_tag.outputs.tag }}"
          VERSION="${OLD_VERSION#v}"

          IFS='.' read -r major minor patch <<< "$VERSION"

          case "${{ github.event.inputs.version_type }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Invalid version type: ${{ github.event.inputs.version_type }}" >&2
              exit 1
              ;;
          esac

          NEW_VERSION="$major.$minor.$patch"
          NEW_TAG="v$NEW_VERSION"

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

          echo "CUSTOM_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
          echo "CUSTOM_TAG=$NEW_TAG" >> "$GITHUB_ENV"

      - name: Show release version
        run: |
          echo "Releasing $CUSTOM_TAG"
          echo "Cargo version: $CUSTOM_VERSION"

      - name: Update Cargo workspace version
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          import os

          version = os.environ["CUSTOM_VERSION"]

          files = [
              Path("Cargo.toml"),
              Path("crates/gvmr-core/Cargo.toml"),
              Path("crates/gvmr-server/Cargo.toml"),
              Path("crates/gvmr-cli/Cargo.toml"),
          ]

          for path in files:
              if not path.exists():
                  continue

              text = path.read_text()

              updated = re.sub(
                  r'(?m)^version\s*=\s*"[^"]+"',
                  f'version = "{version}"',
                  text,
                  count=1,
              )

              if updated != text:
                  path.write_text(updated)
                  print(f"Updated {path}")
              else:
                  print(f"No version field changed in {path}")
          PY

      - name: Update Cargo.lock
        run: |
          cargo update --workspace

      - name: Run fast checks
        run: |
          cargo test --workspace --locked

      - name: Commit version changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Cargo.toml Cargo.lock crates/*/Cargo.toml

          if ! git diff --cached --quiet; then
            git commit -m "chore(release): bump to $CUSTOM_TAG"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No version changes to commit."
          fi

      - name: Create and push tag
        run: |
          git fetch --tags --force

          if git rev-parse "$CUSTOM_TAG" >/dev/null 2>&1; then
            echo "Tag $CUSTOM_TAG already exists" >&2
            exit 1
          fi

          git tag "$CUSTOM_TAG" -m "Release $CUSTOM_TAG"
          git push origin "$CUSTOM_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.CUSTOM_TAG }}
          name: ${{ env.CUSTOM_TAG }}
          generate_release_notes: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push amd64 Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            TYPST_VERSION=${{ env.TYPST_VERSION }}
          tags: |
            docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.CUSTOM_TAG }}
            docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.CUSTOM_VERSION }}
            docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max